name: Release CIA

# Builds the 3DS app into a .cia inside the devkitARM Docker image and attaches
# it to a GitHub Release. The web install page's QR points at
# releases/latest/download/rom-archive.cia, so publishing a release here is what
# makes the QR install flow live.
#
# Triggers:
#   - pushing a tag like v1.0.0  -> builds and publishes a release for that tag
#   - manual dispatch            -> builds and uploads the .cia as a run artifact
#                                   (no release), for verifying the build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # required to create releases and upload assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build the CIA in the devkitARM Docker image
        env:
          # The base URL the released CIA talks to at runtime. Set the
          # API_BASE_URL repository variable to the deployed API origin; the
          # fallback keeps the build reproducible if it is unset.
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://rom-archive.vercel.app' }}
        run: |
          chmod +x apps/3ds/build.sh
          API_BASE_URL="$API_BASE_URL" KEEP_ARTIFACTS=1 apps/3ds/build.sh --check

      - name: Upload CIA + 3DSX as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rom-archive-cia
          path: |
            apps/3ds/rom-archive.cia
            apps/3ds/rom-archive.3dsx
          if-no-files-found: error

      # The .3dsx ships alongside the .cia so the app is testable through the
      # Homebrew Launcher even when a CIA install is unavailable or suspect.
      - name: Publish GitHub Release with the CIA + 3DSX attached
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/3ds/rom-archive.cia
            apps/3ds/rom-archive.3dsx
          fail_on_unmatched_files: true
          generate_release_notes: true
